name: "Lint PR"

on:
  pull_request:
    branches:
      - main

permissions:
  pull-requests: read

jobs:
  main:
    name: Validate PR title
    runs-on: arc-runner-set-arm
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}